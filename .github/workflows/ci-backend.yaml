name: CI - Backend

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Python using UV
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          python-version: '3.13'
          working-directory: 'backend'
          enable-cache: true
      - name: Install dependencies
        run: uv sync
      - name: Lint check
        run: uv run ruff check .
      - name: Type check
        run: uv run mypy
      - name: Run tests
        run: uv run pytest -q --cov